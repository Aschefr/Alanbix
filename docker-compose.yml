services:
  backend:
    build: ./backend
    container_name: alanbix_backend
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_HOST=http://host.docker.internal:11434
    volumes:
      - ./backend:/app
      - ./VERSION:/app/VERSION
      - ./CHANGELOG.md:/app/CHANGELOG.md:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    container_name: alanbix_frontend
    ports:
      - "41481:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
