  - id: AXE-26
    title: "Correction de la visibilité des notifications (Toasts) lors du scroll"
    status: DONE
    description: >
      Résolution du bug de clipping/invisibilité des notifications (Toasts) lorsque la page
      est défilée verticalement. Le problème venait du fait que le conteneur des toasts (toast-container)
      était rendu à l'intérieur d'un conteneur parent (.container.animate-in) doté d'une animation
      transform (translateY). En CSS, un ancêtre avec transform crée un nouveau bloc de confinement
      pour les éléments position: fixed, transformant leur comportement en position: absolute.
      La solution utilise une action Svelte personnalisée ('use:portal') pour détacher dynamiquement le
      toast-container de son emplacement initial dès qu'il est instancié/rendu (indépendamment des
      chargements paresseux et blocs conditionnels Svelte #if) et l'insérer directement dans le document.body,
      assurant un ancrage constant au viewport et un défilement propre.
    priority: high

